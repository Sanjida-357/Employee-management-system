<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Salary Slip Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h2>Employee Salary Slip Generator</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3>Enter Employee Details</h3>

            <form id="salaryForm">
                <input type="number" id="empID" placeholder="Employee ID" required>
                <input type="text" id="name" placeholder="Employee Name" required>
                <input type="number" id="daysPresent" placeholder="Days Present" required>
                <input type="number" id="totalDays" placeholder="Total Working Days" required>
                <input type="number" id="leaveTaken" placeholder="Leave Taken" required>
                <input type="number" id="baseSalary" placeholder="Base Salary" required>
                <input type="number" id="overtimeHours" placeholder="Overtime Hours" required>
                <input type="number" id="bonus" placeholder="Bonus" required>
                <button type="submit">Generate Salary Slip</button>
            </form>
        </div>

        <div class="card">
            <h3>Salary Slip</h3>
            <div id="result">
                <p>No salary slip generated yet.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
